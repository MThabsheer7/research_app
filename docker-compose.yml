version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: research_app_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: researcherDatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research_app_backend
    restart: always
    env_file:
      - .env
    environment:
      # Inject the proper containerized DB host URI here, overriding localhost
      - POSTGRES_URI=postgresql://postgres:postgrespassword@db:5432/researcherDatabase
    ports:
      - "8001:8001"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: research_app_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
